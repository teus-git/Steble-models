<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiffuseChat — Gerador de Imagens IA</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <span class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand-name">DiffuseChat</span>
    </div>
    <button class="sidebar-close" id="sidebarClose" title="Fechar barra lateral" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <button class="new-chat-btn" id="newChatBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    Nova Conversa
  </button>

  <div class="sidebar-section-label">Conversas</div>

  <nav class="chat-list" id="chatList">
    <div class="chat-list-empty" id="chatListEmpty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" opacity="0.3">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <p>Nenhuma conversa ainda</p>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="model-status" id="modelStatus">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Verificando…</span>
    </div>
  </div>
</aside>

<!-- Overlay for mobile sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN AREA
═══════════════════════════════════════════════════════════════ -->
<main class="main" id="main">

  <!-- Top bar -->
  <header class="topbar">
    <button class="topbar-btn" id="sidebarToggle" title="Abrir barra lateral" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="topbar-title" id="topbarTitle">DiffuseChat</div>

    <div class="topbar-actions">
      <button class="topbar-btn" id="settingsToggle" title="Configurações de geração" aria-label="Configurações">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Settings panel (slide-in) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-inner">
      <h3 class="settings-title">Parâmetros de Geração</h3>

      <label class="field-label">Prompt negativo
        <textarea id="negPrompt" class="field-input field-textarea" rows="2"
          placeholder="ugly, blurry, low quality, watermark…">ugly, blurry, low quality, text, watermark, distorted</textarea>
      </label>

      <div class="settings-row">
        <label class="field-label">Largura
          <select id="imgWidth" class="field-input field-select">
            <option value="512" selected>512 px</option>
            <option value="768">768 px</option>
            <option value="1024">1024 px</option>
          </select>
        </label>
        <label class="field-label">Altura
          <select id="imgHeight" class="field-input field-select">
            <option value="512" selected>512 px</option>
            <option value="768">768 px</option>
            <option value="1024">1024 px</option>
          </select>
        </label>
      </div>

      <label class="field-label">Passos de inferência
        <div class="slider-row">
          <input type="range" id="stepsRange" class="field-range" min="10" max="100" value="25" step="5" />
          <span class="slider-val" id="stepsVal">25</span>
        </div>
      </label>

      <label class="field-label">Guidance Scale (CFG)
        <div class="slider-row">
          <input type="range" id="cfgRange" class="field-range" min="1" max="20" value="7.5" step="0.5" />
          <span class="slider-val" id="cfgVal">7.5</span>
        </div>
      </label>

      <label class="field-label">Seed (-1 = aleatório)
        <input type="number" id="seedInput" class="field-input" value="-1" min="-1" max="9999999999" />
      </label>
    </div>
  </div>

  <!-- Chat viewport -->
  <div class="chat-viewport" id="chatViewport">

    <!-- Welcome screen (shown when no chat is active) -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-glow"></div>
      <div class="welcome-content">
        <div class="welcome-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="url(#wg)" stroke-width="2"/>
            <path d="M20 44 C20 44 24 28 32 24 C40 20 44 32 44 32 C44 32 40 44 32 44 C24 44 20 44 20 44Z"
                  stroke="url(#wg)" stroke-width="1.5" fill="none"/>
            <circle cx="32" cy="32" r="5" fill="url(#wg)"/>
            <defs>
              <linearGradient id="wg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#4f8ef7"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="welcome-title">DiffuseChat</h1>
        <p class="welcome-subtitle">Geração de imagens com Stable Diffusion.<br>Descreva sua visão — a IA a transforma em arte.</p>
        <div class="welcome-chips">
          <button class="chip" data-prompt="A majestic dragon flying over a neon cyberpunk city at night">🐉 Dragão cyberpunk</button>
          <button class="chip" data-prompt="Serene Japanese zen garden with cherry blossoms, digital art style">🌸 Jardim zen japonês</button>
          <button class="chip" data-prompt="Deep underwater bioluminescent ocean scene with exotic fish">🌊 Oceano bioluminescente</button>
          <button class="chip" data-prompt="Futuristic space station orbiting a gas giant, photorealistic">🚀 Estação espacial</button>
        </div>
      </div>
    </div>

    <!-- Messages area -->
    <div class="messages-area" id="messagesArea"></div>

  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-container">
      <textarea
        id="promptInput"
        class="prompt-textarea"
        placeholder="Descreva a imagem que deseja gerar…"
        rows="1"
        maxlength="500"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Gerar imagem" aria-label="Enviar" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Pressione <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> nova linha</p>
  </div>

</main>

<!-- ═══════════════════════════════════════════════════════════════
     IMAGE LIGHTBOX
═══════════════════════════════════════════════════════════════ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Imagem ampliada">
  <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
  <div class="lightbox-content">
    <img class="lightbox-img" id="lightboxImg" src="" alt="Imagem gerada" />
    <div class="lightbox-controls">
      <button class="lightbox-btn" id="lightboxDownload" title="Baixar imagem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Baixar
      </button>
      <button class="lightbox-btn lightbox-close" id="lightboxClose" title="Fechar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Fechar
      </button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
  </html>
